<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, sans-serif">
  <text x="440" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#1d1c1a">Hierarki level audio (peak, dB)</text>

  <!-- skala -->
  <g font-family="monospace" font-size="13" fill="#6f6c66" text-anchor="end">
    <text x="120" y="96">0 dB</text><line x1="132" y1="92" x2="800" y2="92" stroke="#e0ddd6"/>
    <text x="120" y="146">-6</text><line x1="132" y1="142" x2="800" y2="142" stroke="#e0ddd6"/>
    <text x="120" y="196">-12</text><line x1="132" y1="192" x2="800" y2="192" stroke="#e0ddd6"/>
    <text x="120" y="246">-18</text><line x1="132" y1="242" x2="800" y2="242" stroke="#e0ddd6"/>
    <text x="120" y="296">-24</text><line x1="132" y1="292" x2="800" y2="292" stroke="#e0ddd6"/>
    <text x="120" y="346">-30</text><line x1="132" y1="342" x2="800" y2="342" stroke="#e0ddd6"/>
  </g>

  <!-- zona merah -->
  <rect x="132" y="66" width="668" height="26" fill="#f6dddd"/>
  <text x="790" y="84" text-anchor="end" font-size="13" font-weight="700" fill="#b03a37">0 dB = pecah/distorsi — JANGAN PERNAH</text>

  <!-- bar -->
  <g>
    <rect x="190" y="142" width="120" height="228" rx="10" fill="#2e7d4f"/>
    <text x="250" y="404" text-anchor="middle" font-size="16" font-weight="700" fill="#1d1c1a">DIALOG</text>
    <text x="250" y="426" text-anchor="middle" font-size="13" fill="#6f6c66">raja: -6 s.d. -12</text>

    <rect x="400" y="242" width="120" height="128" rx="10" fill="#1a7fad"/>
    <text x="460" y="404" text-anchor="middle" font-size="16" font-weight="700" fill="#1d1c1a">MUSIK</text>
    <text x="460" y="426" text-anchor="middle" font-size="13" fill="#6f6c66">saat ada dialog: -20 s.d. -25</text>

    <rect x="610" y="222" width="120" height="148" rx="10" fill="#c2367f"/>
    <text x="670" y="404" text-anchor="middle" font-size="16" font-weight="700" fill="#1d1c1a">SFX</text>
    <text x="670" y="426" text-anchor="middle" font-size="13" fill="#6f6c66">bumbu: terasa, tak menonjol</text>
  </g>

  <!-- ducking note -->
  <path d="M520 262 q40 -34 80 -6" fill="none" stroke="#6f6c66" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ar5)"/>
  <text x="560" y="236" font-size="12.5" fill="#6f6c66">musik boleh naik ke -10 s.d. -15 saat tak ada dialog (ducking)</text>

  <defs><marker id="ar5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#6f6c66"/></marker></defs>
</svg>
