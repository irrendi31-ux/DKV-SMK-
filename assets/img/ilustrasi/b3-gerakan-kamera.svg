<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="system-ui, sans-serif">
  <defs>
    <g id="kam">
      <rect x="-26" y="-15" width="52" height="30" rx="6" fill="#1d1c1a"/>
      <path d="M26 -8 L44 -16 L44 16 L26 8 Z" fill="#1d1c1a"/>
    </g>
    <marker id="ar7" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#1a7fad"/></marker>
    <marker id="ar7s" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#1a7fad"/></marker>
  </defs>

  <g text-anchor="middle">
    <!-- PAN -->
    <g transform="translate(150,110)">
      <use href="#kam"/>
      <path d="M-64 -34 A 74 74 0 0 1 64 -34" fill="none" stroke="#1a7fad" stroke-width="3.5" marker-end="url(#ar7)" marker-start="url(#ar7s)"/>
      <text y="72" font-size="16" font-weight="700" fill="#1d1c1a">PAN</text>
      <text y="92" font-size="12.5" fill="#6f6c66">menoleh kiri-kanan, poros diam</text>
    </g>
    <!-- TILT -->
    <g transform="translate(440,110)">
      <use href="#kam"/>
      <path d="M62 -52 A 66 66 0 0 1 62 52" fill="none" stroke="#1a7fad" stroke-width="3.5" marker-end="url(#ar7)" marker-start="url(#ar7s)"/>
      <text y="72" font-size="16" font-weight="700" fill="#1d1c1a">TILT</text>
      <text y="92" font-size="12.5" fill="#6f6c66">mendongak-menunduk</text>
    </g>
    <!-- TRACKING -->
    <g transform="translate(730,110)">
      <use href="#kam"/>
      <circle cx="0" cy="-58" r="13" fill="#c2367f"/>
      <line x1="-72" y1="-58" x2="60" y2="-58" stroke="#c2367f" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#ar7)"/>
      <line x1="-72" y1="34" x2="60" y2="34" stroke="#1a7fad" stroke-width="3.5" marker-end="url(#ar7)"/>
      <text y="72" font-size="16" font-weight="700" fill="#1d1c1a">TRACKING / FOLLOW</text>
      <text y="92" font-size="12.5" fill="#6f6c66">berjalan bersama subjek</text>
    </g>
    <!-- DOLLY IN/OUT -->
    <g transform="translate(150,330)">
      <use href="#kam"/>
      <circle cx="118" cy="0" r="16" fill="#c2367f"/>
      <line x1="34" y1="0" x2="94" y2="0" stroke="#1a7fad" stroke-width="3.5" marker-end="url(#ar7)" marker-start="url(#ar7s)"/>
      <text y="72" font-size="16" font-weight="700" fill="#1d1c1a">DOLLY IN / OUT</text>
      <text y="92" font-size="12.5" fill="#6f6c66">kamera pindah mendekat-menjauh</text>
      <text y="110" font-size="12.5" fill="#6f6c66">(bukan zoom!)</text>
    </g>
    <!-- HANDHELD -->
    <g transform="translate(440,330)">
      <g transform="rotate(-6)"><use href="#kam"/></g>
      <path d="M-58 -40 q14 -14 28 0 q14 14 28 0 q14 -14 28 0" fill="none" stroke="#1a7fad" stroke-width="3"/>
      <text y="72" font-size="16" font-weight="700" fill="#1d1c1a">HANDHELD</text>
      <text y="92" font-size="12.5" fill="#6f6c66">goyangan alami = energi/dokumenter</text>
      <text y="110" font-size="12.5" fill="#6f6c66">pilihan rasa, bukan kecelakaan</text>
    </g>
    <!-- ZOOM warning -->
    <g transform="translate(730,330)">
      <use href="#kam"/>
      <path d="M34 -14 L86 -34 M34 14 L86 34" stroke="#b03a37" stroke-width="3" stroke-dasharray="6 5"/>
      <text y="72" font-size="16" font-weight="700" fill="#b03a37">ZOOM ≈ hindari</text>
      <text y="92" font-size="12.5" fill="#6f6c66">mengubah kaca pembesar, bukan</text>
      <text y="110" font-size="12.5" fill="#6f6c66">memindahkan penonton</text>
    </g>
  </g>

  <text x="440" y="470" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1d1c1a">Aturan #1: setiap gerakan harus punya ALASAN — mengikuti subjek, mengungkap info, atau membangun rasa.</text>
</svg>
