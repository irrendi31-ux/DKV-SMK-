<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="system-ui, sans-serif">
  <!-- roda warna 12 -->
  <g>
    <circle cx="230" cy="250" r="150" fill="none" stroke="#e6e3dd" stroke-width="2"/>
    <circle cx="230" cy="100" r="34" fill="hsl(0,72%,52%)"/>
    <circle cx="305" cy="120" r="34" fill="hsl(30,85%,52%)"/>
    <circle cx="360" cy="175" r="34" fill="hsl(45,90%,52%)"/>
    <circle cx="380" cy="250" r="34" fill="hsl(60,85%,50%)"/>
    <circle cx="360" cy="325" r="34" fill="hsl(90,55%,45%)"/>
    <circle cx="305" cy="380" r="34" fill="hsl(150,55%,40%)"/>
    <circle cx="230" cy="400" r="34" fill="hsl(180,60%,42%)"/>
    <circle cx="155" cy="380" r="34" fill="hsl(210,70%,48%)"/>
    <circle cx="100" cy="325" r="34" fill="hsl(240,55%,52%)"/>
    <circle cx="80"  cy="250" r="34" fill="hsl(270,55%,50%)"/>
    <circle cx="100" cy="175" r="34" fill="hsl(300,55%,50%)"/>
    <circle cx="155" cy="120" r="34" fill="hsl(330,70%,52%)"/>
    <text x="230" y="256" text-anchor="middle" font-size="17" font-weight="700" fill="#1d1c1a">RODA WARNA</text>
  </g>

  <!-- empat skema -->
  <g font-size="14" font-weight="600" fill="#1d1c1a" text-anchor="middle">
    <!-- komplementer -->
    <circle cx="560" cy="115" r="46" fill="none" stroke="#c4c1ba" stroke-width="2"/>
    <circle cx="560" cy="69" r="13" fill="hsl(210,70%,48%)"/>
    <circle cx="560" cy="161" r="13" fill="hsl(30,85%,52%)"/>
    <line x1="560" y1="82" x2="560" y2="148" stroke="#6f6c66" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="560" y="205">Komplementer</text>
    <text x="560" y="224" font-weight="400" font-size="12" fill="#6f6c66">berseberangan — kontras kuat</text>

    <!-- analog -->
    <circle cx="760" cy="115" r="46" fill="none" stroke="#c4c1ba" stroke-width="2"/>
    <circle cx="760" cy="69" r="13" fill="hsl(180,60%,42%)"/>
    <circle cx="800" cy="92" r="13" fill="hsl(210,70%,48%)"/>
    <circle cx="720" cy="92" r="13" fill="hsl(150,55%,40%)"/>
    <text x="760" y="205">Analog</text>
    <text x="760" y="224" font-weight="400" font-size="12" fill="#6f6c66">bersebelahan — tenang</text>

    <!-- triadik -->
    <circle cx="560" cy="360" r="46" fill="none" stroke="#c4c1ba" stroke-width="2"/>
    <circle cx="560" cy="314" r="13" fill="hsl(0,72%,52%)"/>
    <circle cx="600" cy="383" r="13" fill="hsl(240,55%,52%)"/>
    <circle cx="520" cy="383" r="13" fill="hsl(60,85%,50%)"/>
    <path d="M560 327 L590 377 L530 377 Z" fill="none" stroke="#6f6c66" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="560" y="450">Triadik</text>
    <text x="560" y="469" font-weight="400" font-size="12" fill="#6f6c66">berjarak sama — ceria, seimbang</text>

    <!-- monokromatik -->
    <g>
      <rect x="716" y="318" width="22" height="70" fill="hsl(210,70%,30%)"/>
      <rect x="738" y="318" width="22" height="70" fill="hsl(210,70%,48%)"/>
      <rect x="760" y="318" width="22" height="70" fill="hsl(210,65%,65%)"/>
      <rect x="782" y="318" width="22" height="70" fill="hsl(210,60%,82%)"/>
    </g>
    <text x="760" y="450">Monokromatik</text>
    <text x="760" y="469" font-weight="400" font-size="12" fill="#6f6c66">satu hue — main value &#38; saturasi</text>
  </g>

  <text x="440" y="515" text-anchor="middle" font-size="14" fill="#6f6c66">pakai satu warna sebagai dominan, sisanya aksen — jangan semua sama kuat</text>
</svg>
