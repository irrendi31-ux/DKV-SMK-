<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="system-ui, sans-serif">
  <defs>
    <pattern id="tex" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#1d1c1a" stroke-width="3"/>
    </pattern>
    <radialGradient id="bola" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#8a8781"/>
      <stop offset="100%" stop-color="#1d1c1a"/>
    </radialGradient>
  </defs>
  <g text-anchor="middle" font-size="15" font-weight="600" fill="#1d1c1a">
    <!-- baris 1 -->
    <rect x="30" y="30" width="190" height="150" rx="14" fill="#fff"/>
    <circle cx="125" cy="98" r="12" fill="#1d1c1a"/>
    <circle cx="88" cy="120" r="4" fill="#1d1c1a" opacity=".5"/>
    <circle cx="160" cy="76" r="4" fill="#1d1c1a" opacity=".5"/>
    <text x="125" y="210">Titik</text>

    <rect x="240" y="30" width="190" height="150" rx="14" fill="#fff"/>
    <line x1="270" y1="140" x2="400" y2="140" stroke="#1d1c1a" stroke-width="4"/>
    <line x1="270" y1="112" x2="400" y2="70" stroke="#1d1c1a" stroke-width="4"/>
    <path d="M270 92 Q310 40 400 46" fill="none" stroke="#1d1c1a" stroke-width="4"/>
    <text x="335" y="210">Garis</text>

    <rect x="450" y="30" width="190" height="150" rx="14" fill="#fff"/>
    <rect x="486" y="66" width="58" height="58" fill="#1d1c1a"/>
    <circle cx="588" cy="122" r="30" fill="#c2367f"/>
    <text x="545" y="210">Bidang</text>

    <rect x="660" y="30" width="190" height="150" rx="14" fill="#fff"/>
    <circle cx="755" cy="102" r="42" fill="url(#bola)"/>
    <ellipse cx="755" cy="152" rx="34" ry="7" fill="#1d1c1a" opacity=".18"/>
    <text x="755" y="210">Bentuk</text>

    <!-- baris 2 -->
    <rect x="30" y="250" width="190" height="150" rx="14" fill="#fff"/>
    <rect x="150" y="350" width="26" height="26" fill="#1d1c1a"/>
    <text x="125" y="430">Ruang</text>

    <rect x="240" y="250" width="190" height="150" rx="14" fill="#fff"/>
    <rect x="272" y="284" width="126" height="82" rx="8" fill="url(#tex)" opacity=".85"/>
    <text x="335" y="430">Tekstur</text>

    <rect x="450" y="250" width="190" height="150" rx="14" fill="#fff"/>
    <g>
      <rect x="482" y="292" width="36" height="66" fill="#c2367f"/>
      <rect x="527" y="292" width="36" height="66" fill="#d9a800"/>
      <rect x="572" y="292" width="36" height="66" fill="#1a7fad"/>
    </g>
    <text x="545" y="430">Warna</text>

    <rect x="660" y="250" width="190" height="150" rx="14" fill="#fff"/>
    <g>
      <rect x="688" y="292" width="27" height="66" fill="#1d1c1a"/>
      <rect x="715" y="292" width="27" height="66" fill="#55534d"/>
      <rect x="742" y="292" width="27" height="66" fill="#8a8781"/>
      <rect x="769" y="292" width="27" height="66" fill="#c4c1ba"/>
      <rect x="796" y="292" width="27" height="66" fill="#efede9" stroke="#c4c1ba"/>
    </g>
    <text x="755" y="430">Gelap-terang</text>
  </g>
  <text x="440" y="464" text-anchor="middle" font-size="14" fill="#6f6c66">delapan unsur — bahan dasar semua desain; kombinasinya tak terbatas</text>
</svg>
